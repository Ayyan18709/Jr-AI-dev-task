version: "3.9"

services:
  # ── Redis cache ─────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: rag_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── RAG Chatbot API ─────────────────────────────────────────────────────────
  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: rag_api
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - CACHE_ENABLED=true
      - CACHE_TTL=3600
      - LLM_MODEL_NAME=Qwen/Qwen2.5-1.5B-Instruct
      - LLM_DEVICE=auto
      - LLM_MAX_NEW_TOKENS=512
      - EMBEDDING_MODEL=all-MiniLM-L6-v2
      - USE_RERANKER=true
      - CHUNK_SIZE=400
      - CHUNK_OVERLAP=50
      - RETRIEVAL_TOP_K=5
      - SEMANTIC_WEIGHT=0.6
      - BM25_WEIGHT=0.4
      - MEMORY_MAX_INTERACTIONS=10
    volumes:
      - model_cache:/app/.cache/huggingface
      - faiss_data:/app/data/faiss_index
      - upload_data:/app/data/uploads
      - session_data:/app/data/sessions.json
      - log_data:/app/logs
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 60s
      timeout: 30s
      start_period: 180s   # model download takes time on first run
      retries: 3

  # ── Streamlit Frontend ──────────────────────────────────────────────────────
  frontend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.frontend
    container_name: rag_frontend
    restart: unless-stopped
    ports:
      - "8501:8501"
    environment:
      - API_BASE_URL=http://api:8000
    depends_on:
      - api

volumes:
  redis_data:
  model_cache:      # persists HF model weights across restarts
  faiss_data:       # persists FAISS index across restarts
  upload_data:      # persists uploaded CVs
  session_data:     # persists memory sessions
  log_data:         # persists application logs
